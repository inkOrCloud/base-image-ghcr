name: Build Base Image to GHCR

on:
  workflow_dispatch:
    inputs:
      FILTER:
        description: "Filter configs by pattern (e.g. cuda-12, stock, 24)"
        required: false
        default: ""
      DRY_RUN:
        description: "Print what would build without building"
        required: false
        default: false
        type: boolean
      GHCR_NAMESPACE:
        description: "GitHub org/user namespace"
        required: false
        default: ""
      GHCR_REPO:
        description: "Container repository name"
        required: false
        default: "base-image"

concurrency:
  group: base-image-ghcr-build
  cancel-in-progress: false

jobs:
  validate-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check GHCR availability
        run: |
          echo "Using GITHUB_TOKEN for GHCR push"

  generate-matrix:
    needs: validate-secrets
    runs-on: ubuntu-latest
    outputs:
      build-matrix: ${{ steps.matrix.outputs.build-matrix }}
      merge-matrix: ${{ steps.matrix.outputs.merge-matrix }}
      mini-build-matrix: ${{ steps.matrix.outputs.mini-build-matrix }}
      mini-merge-matrix: ${{ steps.matrix.outputs.mini-merge-matrix }}
      build-date: ${{ steps.matrix.outputs.build-date }}
    steps:
      - name: Generate matrices
        id: matrix
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%d)
          echo "build-date=$BUILD_DATE" >> $GITHUB_OUTPUT

          FILTER="${{ inputs.FILTER }}"

          CONFIGS=(
            "stock-22|ubuntu:22.04|stock-ubuntu22.04|linux/amd64,linux/arm64|3.10"
            "stock-24|ubuntu:24.04|stock-ubuntu24.04|linux/amd64,linux/arm64|3.12"
            "cuda-11.8-22|nvidia/cuda:11.8.0-cudnn8-devel-ubuntu22.04|cuda-11.8.0-cudnn8-devel-ubuntu22.04|linux/amd64,linux/arm64|3.10"
            "cuda-12.1-22|nvidia/cuda:12.1.1-cudnn8-devel-ubuntu22.04|cuda-12.1.1-cudnn8-devel-ubuntu22.04|linux/amd64,linux/arm64|3.10"
            "cuda-12.4-22|nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04|cuda-12.4.1-cudnn-devel-ubuntu22.04|linux/amd64,linux/arm64|3.10"
            "cuda-12.6-24|nvidia/cuda:12.6.3-cudnn-devel-ubuntu24.04|cuda-12.6.3-cudnn-devel-ubuntu24.04|linux/amd64,linux/arm64|3.12"
            "cuda-12.8-24|nvidia/cuda:12.8.1-cudnn-devel-ubuntu24.04|cuda-12.8.1-cudnn-devel-ubuntu24.04|linux/amd64,linux/arm64|3.12"
            "cuda-12.9-24|nvidia/cuda:12.9.1-cudnn-devel-ubuntu24.04|cuda-12.9.1-cudnn-devel-ubuntu24.04|linux/amd64,linux/arm64|3.12"
            "cuda-13.0.2-24|nvidia/cuda:13.0.2-cudnn-devel-ubuntu24.04|cuda-13.0.2-cudnn-devel-ubuntu24.04|linux/amd64,linux/arm64|3.12"
            "cuda-13.1.1-24|nvidia/cuda:13.1.1-cudnn-devel-ubuntu24.04|cuda-13.1.1-cudnn-devel-ubuntu24.04|linux/amd64,linux/arm64|3.12"
            "cuda-13.2.0-24|nvidia/cuda:13.2.0-cudnn-devel-ubuntu24.04|cuda-13.2.0-cudnn-devel-ubuntu24.04|linux/amd64,linux/arm64|3.12"
          )

          BUILD_MATRIX="[]"
          MERGE_MATRIX="[]"

          for config in "${CONFIGS[@]}"; do
            IFS='|' read -r key base_image tag_template arches default_python <<< "$config"
            if [[ -n "$FILTER" && "$key" != *"$FILTER"* ]]; then
              continue
            fi
            MERGE_MATRIX=$(echo "$MERGE_MATRIX" | jq -c \
              --arg key "$key" \
              --arg tag_template "$tag_template" \
              --arg default_python "$default_python" \
              '. + [{"config_key": $key, "tag_template": $tag_template, "default_python": $default_python}]')
            IFS=',' read -ra ARCH_LIST <<< "$arches"
            for arch in "${ARCH_LIST[@]}"; do
              arch_suffix="${arch#linux/}"
              BUILD_MATRIX=$(echo "$BUILD_MATRIX" | jq -c \
                --arg key "$key" \
                --arg base_image "$base_image" \
                --arg tag_template "$tag_template" \
                --arg arch "$arch" \
                --arg arch_suffix "$arch_suffix" \
                --arg default_python "$default_python" \
                '. + [{"config_key": $key, "base_image": $base_image, "tag_template": $tag_template, "arch": $arch, "arch_suffix": $arch_suffix, "default_python": $default_python}]')
            done
          done

          MINI_CONFIGS=(
            "cuda-12.9-mini|cuda-12.9-mini|12-9"
            "cuda-13.2-mini|cuda-13.2-mini|13-2"
          )

          MINI_BUILD_MATRIX="[]"
          MINI_MERGE_MATRIX="[]"

          for mini_config in "${MINI_CONFIGS[@]}"; do
            IFS='|' read -r key mini_tag cuda_versions <<< "$mini_config"
            if [[ -n "$FILTER" && "$key" != *"$FILTER"* && "mini" != *"$FILTER"* ]]; then
              continue
            fi
            MINI_MERGE_MATRIX=$(echo "$MINI_MERGE_MATRIX" | jq -c \
              --arg key "$key" \
              --arg mini_tag "$mini_tag" \
              '. + [{"config_key": $key, "mini_tag": $mini_tag}]')
            for arch in "linux/amd64" "linux/arm64"; do
              arch_suffix="${arch#linux/}"
              MINI_BUILD_MATRIX=$(echo "$MINI_BUILD_MATRIX" | jq -c \
                --arg key "$key" \
                --arg mini_tag "$mini_tag" \
                --arg cuda_versions "$cuda_versions" \
                --arg arch "$arch" \
                --arg arch_suffix "$arch_suffix" \
                '. + [{"config_key": $key, "mini_tag": $mini_tag, "cuda_versions": $cuda_versions, "arch": $arch, "arch_suffix": $arch_suffix}]')
            done
          done

          {
            echo "build-matrix<<BUILD_MATRIX_EOF"
            echo "{\"include\":${BUILD_MATRIX}}"
            echo "BUILD_MATRIX_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "merge-matrix<<MERGE_MATRIX_EOF"
            echo "{\"include\":${MERGE_MATRIX}}"
            echo "MERGE_MATRIX_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "mini-build-matrix<<MINI_BUILD_MATRIX_EOF"
            echo "{\"include\":${MINI_BUILD_MATRIX}}"
            echo "MINI_BUILD_MATRIX_EOF"
          } >> $GITHUB_OUTPUT
          {
            echo "mini-merge-matrix<<MINI_MERGE_MATRIX_EOF"
            echo "{\"include\":${MINI_MERGE_MATRIX}}"
            echo "MINI_MERGE_MATRIX_EOF"
          } >> $GITHUB_OUTPUT

  build:
    needs: generate-matrix
    if: ${{ !inputs.DRY_RUN }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.generate-matrix.outputs.build-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: ./.github/actions/maximize-build-space

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build all Python versions
        env:
          GHCR_NAMESPACE: ${{ inputs.GHCR_NAMESPACE || github.repository_owner }}
          GHCR_REPO: ${{ inputs.GHCR_REPO || 'base-image' }}
          TAG_TEMPLATE: ${{ matrix.tag_template }}
          BASE_IMAGE: ${{ matrix.base_image }}
          ARCH: ${{ matrix.arch }}
          ARCH_SUFFIX: ${{ matrix.arch_suffix }}
          DEFAULT_PYTHON: ${{ matrix.default_python }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          PYTHON_VERSIONS=("3.10" "3.11" "3.12" "3.13" "3.14")
          mkdir -p built-tags

          for py_version in "${PYTHON_VERSIONS[@]}"; do
            py_tag="${py_version//.}"
            PRIMARY_TAG="ghcr.io/${GHCR_NAMESPACE}/${GHCR_REPO}:${TAG_TEMPLATE}-py${py_tag}-${BUILD_DATE}-${ARCH_SUFFIX}"
            TAGS="--tag ${PRIMARY_TAG}"

            if [[ "$py_version" == "$DEFAULT_PYTHON" ]]; then
              ALIAS_TAG="ghcr.io/${GHCR_NAMESPACE}/${GHCR_REPO}:${TAG_TEMPLATE}-${BUILD_DATE}-${ARCH_SUFFIX}"
              TAGS+=" --tag ${ALIAS_TAG}"
              echo "$ALIAS_TAG" >> built-tags/tags.txt
            fi

            docker buildx build \
              --progress=plain \
              --platform "${ARCH}" \
              -f Dockerfile \
              --build-arg BASE_IMAGE="${BASE_IMAGE}" \
              --build-arg PYTHON_VERSION="${py_version}" \
              ${TAGS} \
              --push .

            echo "$PRIMARY_TAG" >> built-tags/tags.txt
          done

      - name: Upload built tags
        uses: actions/upload-artifact@v4
        with:
          name: built-tags-${{ matrix.config_key }}-${{ matrix.arch_suffix }}
          path: built-tags/
          retention-days: 1

  merge-manifests:
    needs: [generate-matrix, build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.merge-matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built tags
        uses: actions/download-artifact@v4
        with:
          pattern: built-tags-*
          path: all-tags/
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        env:
          GHCR_NAMESPACE: ${{ inputs.GHCR_NAMESPACE || github.repository_owner }}
          GHCR_REPO: ${{ inputs.GHCR_REPO || 'base-image' }}
          TAG_TEMPLATE: ${{ matrix.tag_template }}
          BUILD_DATE: ${{ needs.generate-matrix.outputs.build-date }}
        run: |
          if [ -d all-tags ] && [ "$(ls -A all-tags 2>/dev/null)" ]; then
            TAGS=$(cat all-tags/*.txt | grep "${TAG_TEMPLATE}" || true)
            echo "$TAGS"
          fi

          # Placeholder manifest step for GHCR-only publishing
          echo "GHCR publish completed for ${TAG_TEMPLATE}"
